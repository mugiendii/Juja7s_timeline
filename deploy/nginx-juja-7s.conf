# /etc/nginx/sites-available/juja-7s.nodewave.dev
# Cloudflare is proxied (orange cloud) in front of this, SSL/TLS mode = Full (strict).
# nginx terminates TLS using a Cloudflare Origin CA certificate (free, from the
# Cloudflare dashboard: SSL/TLS → Origin Server → Create Certificate).

server {
    listen 80;
    listen [::]:80;
    server_name juja-7s.nodewave.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name juja-7s.nodewave.dev;

    ssl_certificate     /etc/ssl/cloudflare/juja-7s.nodewave.dev.pem;
    ssl_certificate_key /etc/ssl/cloudflare/juja-7s.nodewave.dev.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Restores the visitor's real IP from Cloudflare's CF-Connecting-IP header.
    # Optional, but otherwise every request in logs shows Cloudflare's IP.
    include /etc/nginx/cloudflare-realip.conf;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
